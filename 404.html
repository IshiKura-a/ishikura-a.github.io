<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Redirecting to zihaotang.com</title>
  <link rel="canonical" href="https://zihaotang.com/" />
  <meta http-equiv="refresh" content="0; url=https://zihaotang.com/" />
  <script>
    const target = new URL("https://zihaotang.com/");
    target.pathname = location.pathname === "/" ? "/" : location.pathname;
    target.search = location.search;
    target.hash = location.hash;
    location.replace(target.toString());
  </script>
</head>
<body>
  <p>Redirecting to <a href="https://zihaotang.com/">zihaotang.com</a>.</p>
</body>
</html>
